name: Deploy backend (Fly.io)

# Remote-build deploy to the legalise-backend Fly app. Builds the image
# on Fly's builders (no Docker on the runner), runs the release_command
# (`alembic upgrade head` per backend/fly.toml) against Neon, then
# promotes. Mirrors the frontend's auto-on-push behaviour so neither
# surface needs a manual deploy from a workstation.
#
# Required repo secret (Settings → Secrets and variables → Actions):
#   FLY_API_TOKEN  — a Fly deploy token. Create at
#                    https://fly.io/dashboard → Tokens (or
#                    `fly tokens create deploy -a legalise-backend`
#                    from a machine with working DNS). Scope to the
#                    legalise-backend app where possible.
#
# The Dockerfile clones claude-for-uk-legal at PLUGINS_REPO_REF during
# the image build, so no plugin checkout is needed on the runner.

on:
  push:
    branches: [master]
    paths:
      - 'backend/**'
      - '.github/workflows/deploy-backend.yml'
  workflow_dispatch:

concurrency:
  group: deploy-backend
  # Never cancel a backend deploy mid-flight — the release_command runs
  # Alembic migrations against the production DB. Cancelling between the
  # migration and the promote could leave the schema ahead of the
  # running image. Let in-flight deploys finish.
  cancel-in-progress: false

jobs:
  deploy:
    name: Remote-build + deploy to Fly
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy (remote build + release migrations)
        working-directory: backend
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: flyctl deploy --remote-only
