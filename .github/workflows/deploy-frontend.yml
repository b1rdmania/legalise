name: Deploy frontend (Cloudflare Pages)

# Direct-upload deploy to the legalise Pages project. The project was
# created via `wrangler pages project create` and cannot be retroactively
# converted to a git-integration project — Cloudflare confirmed. This
# workflow gives us the same auto-on-push behaviour by running the
# wrangler upload from CI.
#
# Required repo secrets (Settings → Secrets and variables → Actions):
#   CLOUDFLARE_API_TOKEN   — scoped token, "Edit Cloudflare Workers" template
#                            (covers Pages too). Restrict account scope to
#                            legalise.dev's CF account.
#   CLOUDFLARE_ACCOUNT_ID  — ff7e84841bce6f90ee9479e0cb31b2ca
#
# legalise.dev is the static evaluation site. Local and self-hosted builds
# retain normal auth because disabled mode is scoped to the legalise.dev host.

on:
  push:
    branches: [master]
    paths:
      - 'frontend/**'
      - '.github/workflows/deploy-frontend.yml'
  workflow_dispatch:

concurrency:
  group: deploy-frontend
  cancel-in-progress: true

jobs:
  deploy:
    name: Build + deploy to Cloudflare Pages
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build (production)
        working-directory: frontend
        env:
          VITE_HOSTED_ACCESS_MODE: disabled
        run: npm run build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy frontend/dist --project-name=legalise --branch=master
