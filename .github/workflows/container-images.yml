name: Container images

on:
  push:
    branches:
      - master
      - codex/chat-led-matter-shell
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: container-images-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build + publish ${{ matrix.name }}
    runs-on: ubuntu-latest
    # Multi-arch via QEMU emulation: the arm64 backend bakes the embedding
    # model under emulation, which is slow — hence the generous timeout.
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: backend
            context: backend
            image: legalise-backend
          - name: frontend
            context: frontend
            image: legalise-frontend

    steps:
      - uses: actions/checkout@v4

      # Enables building linux/arm64 on an amd64 runner.
      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-
            type=semver,pattern={{version}}
            type=raw,value=latest,enable={{is_default_branch}}

      - uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,scope=${{ matrix.name }},mode=max
