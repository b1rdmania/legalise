name: CI

# Runs the backend pytest suite against a real Postgres + pgvector,
# then the frontend type-check + production build. Mirrors the local
# development loop documented in CONTRIBUTING.md.

on:
  push:
    branches:
      - master
      - runtime-rewrite
    # Skip the expensive sweep for docs-only pushes. Source changes
    # still run the full gate; handover docs and READMEs do not.
    paths-ignore:
      - 'docs/**'
      - '**/*.md'
  pull_request:
    paths-ignore:
      - 'docs/**'
      - '**/*.md'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend pytest (${{ matrix.shard }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        shard: [shard-a, shard-b]

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: legalise
          POSTGRES_PASSWORD: legalise
          POSTGRES_DB: legalise_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U legalise -d legalise_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      # POSTGRES_DSN is read by `settings.postgres_dsn` and used by
      # alembic (sync psycopg driver). TEST_DATABASE_URL is read by
      # `backend/tests/conftest.py` for the async engine. Both point at
      # the same `legalise_test` database on localhost.
      POSTGRES_DSN: postgresql+psycopg://legalise:legalise@localhost:5432/legalise_test
      TEST_DATABASE_URL: postgresql+asyncpg://legalise:legalise@localhost:5432/legalise_test
      # `development` matches the docker-compose dev env. The email
      # module fails closed on `test` (no RESEND_API_KEY) because the
      # DEV_ENVIRONMENTS allowlist is `{development, dev, local}`. The
      # tests rely on the dev-mode auto-verify path.
      ENVIRONMENT: development
      # The dev container bind-mounts the repo-root schemas dir; CI
      # places it where modules.py + the parity test will find it.
      SCHEMAS_PATH: ${{ github.workspace }}/schemas
      # Matter filesystem root. Default `/data/matters` (the docker
      # volume mount) is not writable on the CI runner.
      MATTERS_ROOT: ${{ github.workspace }}/_matters
      # Unit 1 object storage uses the local-filesystem backend in CI
      # — no MinIO/R2 service. Backend resolves to `LocalStorageBackend`
      # when STORAGE_BACKEND=local; storage root defaults to a temp
      # path inside the workspace.
      STORAGE_BACKEND: local
      LOCAL_STORAGE_ROOT: ${{ github.workspace }}/_storage
      # Reference modules live at repo-root examples/modules and are
      # imported by manifest entrypoint, e.g.
      # examples.modules.contract_review.capability. The backend job
      # runs from ./backend, so add the repo root explicitly.
      PYTHONPATH: ${{ github.workspace }}:${{ github.workspace }}/backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/pyproject.toml

      - name: Install backend (with dev deps)
        working-directory: backend
        run: |
          pip install --upgrade pip
          pip install -e ".[dev,anonymisation]"

      - name: Verify uv lockfile is in sync with pyproject
        working-directory: backend
        run: |
          pip install uv
          uv lock --check

      - name: Verify cryptography floor (>=44.0.0)
        working-directory: backend
        run: |
          python -c "
          import sys, cryptography
          v = tuple(int(p) for p in cryptography.__version__.split('.')[:2])
          print(f'cryptography {cryptography.__version__}')
          assert v >= (44, 0), f'cryptography {cryptography.__version__} below 44.0 floor'
          "

      - name: Run alembic migrations against the test DB
        working-directory: backend
        run: python -m alembic upgrade head

      - name: pytest
        working-directory: backend
        env:
          PYTEST_SHARD: ${{ matrix.shard }}
        run: |
          python - <<'PY' > /tmp/backend-pytest-files.txt
          import os
          from pathlib import Path

          # Computed split: cut where the cumulative line count crosses half,
          # so renames/deletions never strand a hard-coded boundary file.
          files = sorted(Path("tests").glob("test_*.py"))
          lines = [sum(1 for _ in p.open()) for p in files]
          total = sum(lines)
          cum = 0
          split = len(files)
          for i, n in enumerate(lines):
              cum += n
              if cum >= total / 2:
                  split = i + 1
                  break
          shard = os.environ["PYTEST_SHARD"]
          selected = files[:split] if shard == "shard-a" else files[split:]
          for path in selected:
              print(path)
          PY
          mapfile -t pytest_files < /tmp/backend-pytest-files.txt
          # Coverage published as a CI artifact (test-slim order Phase 4 /
          # audit item C2) so the suite's reallocation is visible, not
          # asserted. Per-shard reports; combine offline if needed.
          python -m pytest -x -vv --durations=20 --timeout=60 --timeout-method=thread \
            --cov=app --cov-report=xml:coverage-${PYTEST_SHARD}.xml --cov-report=term:skip-covered \
            "${pytest_files[@]}"

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage-${{ matrix.shard }}
          path: backend/coverage-*.xml
          retention-days: 30

  # ---------------------------------------------------------------------------
  # MinIO smoke — exercises the S3StorageBackend (boto3 path) against a real
  # MinIO instance. Runs in parallel with the main backend job.
  # The main `backend` job stays on STORAGE_BACKEND=local (fast, no MinIO).
  #
  # MinIO is started via `docker run` (not a service container) because
  # `minio/minio` requires `server /data` as the startup command, which
  # GitHub Actions service containers cannot pass via the `services:` block.
  # ---------------------------------------------------------------------------
  storage-minio-smoke:
    name: Storage MinIO smoke
    runs-on: ubuntu-latest
    timeout-minutes: 10

    env:
      ENVIRONMENT: development
      SCHEMAS_PATH: ${{ github.workspace }}/schemas
      MATTERS_ROOT: ${{ github.workspace }}/_matters
      # MinIO-backed storage for this job.
      STORAGE_BACKEND: s3
      S3_ENDPOINT: http://localhost:9000
      S3_ACCESS_KEY: legalise
      S3_SECRET_KEY: legalisesecret
      S3_BUCKET: legalise-smoke
      S3_REGION: us-east-1

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/pyproject.toml

      - name: Install backend (with dev deps)
        working-directory: backend
        run: |
          pip install --upgrade pip
          pip install -e ".[dev,anonymisation]"

      - name: Start MinIO
        run: |
          # Run MinIO as a detached container. `server /data` is the required
          # start command; the service-container syntax cannot pass this so we
          # use docker run directly.
          docker run -d \
            --name minio \
            -p 9000:9000 \
            -e MINIO_ROOT_USER=legalise \
            -e MINIO_ROOT_PASSWORD=legalisesecret \
            minio/minio server /data
          # Wait for MinIO to become ready (up to 30 s).
          for i in $(seq 1 15); do
            curl -sf http://localhost:9000/minio/health/live && echo "MinIO ready" && break
            sleep 2
          done

      - name: Create MinIO bucket
        run: |
          # Install mc (MinIO client) and create the smoke-test bucket.
          curl -fsSL https://dl.min.io/client/mc/release/linux-amd64/mc \
            -o /usr/local/bin/mc
          chmod +x /usr/local/bin/mc
          mc alias set local http://localhost:9000 legalise legalisesecret
          mc mb --ignore-existing local/legalise-smoke

      - name: pytest (MinIO smoke only)
        working-directory: backend
        run: >-
          python -m pytest
          tests/test_storage_minio_smoke.py
          -v --tb=short

  # ---------------------------------------------------------------------------
  # Worker smoke — boots the arq worker against Postgres + Redis and runs an
  # export job round-trip. No model calls; uses LocalStorageBackend.
  # Runs in parallel with the main backend job.
  # ---------------------------------------------------------------------------
  worker-smoke:
    name: Worker smoke (arq + export job)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: legalise
          POSTGRES_PASSWORD: legalise
          POSTGRES_DB: legalise_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U legalise -d legalise_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      POSTGRES_DSN: postgresql+psycopg://legalise:legalise@localhost:5432/legalise_test
      TEST_DATABASE_URL: postgresql+asyncpg://legalise:legalise@localhost:5432/legalise_test
      REDIS_URL: redis://localhost:6379/0
      ENVIRONMENT: development
      SCHEMAS_PATH: ${{ github.workspace }}/schemas
      MATTERS_ROOT: ${{ github.workspace }}/_matters
      # Local storage — no MinIO required for the worker smoke.
      STORAGE_BACKEND: local
      LOCAL_STORAGE_ROOT: ${{ github.workspace }}/_storage

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/pyproject.toml

      - name: Install backend (with dev deps)
        working-directory: backend
        run: |
          pip install --upgrade pip
          pip install -e ".[dev,anonymisation]"

      - name: Run alembic migrations against the test DB
        working-directory: backend
        run: python -m alembic upgrade head

      - name: pytest (worker smoke only)
        working-directory: backend
        run: >-
          python -m pytest
          tests/test_worker_smoke.py
          -v --tb=short -s

  frontend:
    name: Frontend build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: npm ci
        working-directory: frontend
        run: npm ci

      - name: tsc + vite build
        working-directory: frontend
        run: npm run build

      - name: vitest
        working-directory: frontend
        run: npx vitest run

  voice-check:
    name: Voice check (no em or en dashes in chrome)
    runs-on: ubuntu-latest
    timeout-minutes: 2

    steps:
      - uses: actions/checkout@v4

      - name: Voice check with ripgrep
        run: |
          # Fail if any em (U+2014) or en (U+2013) dash appears in the
          # public-copy docs. Mirrors the local check documented in
          # docs/HANDOVER_NEXT.md and CONTRIBUTING.md. Code comments
          # and seeded legal-content strings are intentionally NOT
          # scanned - the rule is for chrome strings + public copy.
          if rg -n "—|–" \
              README.md \
              EXECUTIVE_SUMMARY.md \
              ARCHITECTURE.md \
              docs/MANIFESTO.md \
              docs/ROADMAP.md; then
            echo ""
            echo "Em or en dash found in public copy. Use hyphen-minus."
            exit 1
          fi
          echo "Voice check clean."
