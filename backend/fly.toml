# Fly.io app config for the legalise backend.
#
# Default deploy: `fly deploy` from this directory after `fly launch
# --no-deploy --copy-config` has registered the app and `fly secrets
# set` has populated POSTGRES_DSN / SESSION_SECRET /
# LEGALISE_KEY_ENCRYPTION_SECRET / S3 credentials. Production posture is
# BYO user keys: do NOT set ANTHROPIC_API_KEY / OPENAI_API_KEY here.
# See infra/deploy/cloudflare.md §[server-key posture].
#
# Companion: legalise-gotenberg (internal-only Gotenberg sidecar in the
# same region — see infra/deploy/cloudflare.md §5b).

app = "legalise-backend"
primary_region = "lhr"

[build]
  dockerfile = "Dockerfile"

[env]
  # Backend listens on 8000 inside the machine; the public proxy
  # terminates HTTPS on 443.
  PORT = "8000"
  # "demo" triggers idempotent Khan-v-Acme seeding on boot without enabling
  # uvicorn --reload (which "development" / "dev" / "local" do). Switch to
  # "production" if running an empty-workspace deploy.
  ENVIRONMENT = "demo"
  # MATTERS_ROOT is intentionally ephemeral in v0.1 — the DB is the
  # source of truth and the filesystem-materialised matter folders are
  # derivable. A Fly Volume would keep them across deploys; revisit if
  # operators care about the on-disk matter/ tree surviving redeploys.
  MATTERS_ROOT = "/data/matters"
  # PLUGINS_ROOT is set by the Dockerfile clone — see backend/Dockerfile.
  PLUGINS_ROOT = "/plugins"
  PLUGINS_REPO = "https://github.com/b1rdmania/claude-for-uk-legal"
  PLUGINS_REPO_REF = "3fb0ea86ad49f92d90fbd9dcfbee70f5947ba31c"

[deploy]
  # Unit 3 — migration discipline. Alembic runs ONCE per deploy on a
  # single machine before any new app instances start serving traffic.
  # This prevents the boot-time migration race that occurs when multiple
  # Fly machines start concurrently. The app itself does NOT run
  # migrations at boot (see backend/entrypoint.sh and docs/RUNBOOK.md).
  release_command = "alembic upgrade head"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = false
  min_machines_running = 1
  processes = ["app"]

[[http_service.checks]]
  interval = "15s"
  timeout = "2s"
  grace_period = "10s"
  method = "GET"
  path = "/health"
  protocol = "http"

[[vm]]
  size = "shared-cpu-2x"
  memory = "1gb"
