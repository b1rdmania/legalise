services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: legalise
      POSTGRES_PASSWORD: legalise
      POSTGRES_DB: legalise
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U legalise"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: legalise
      MINIO_ROOT_PASSWORD: legalisesecret
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  gotenberg:
    image: gotenberg/gotenberg:8
    ports:
      - "3001:3000"

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    profiles: ["local-models"]

  backend:
    build: ../backend
    environment:
      ENVIRONMENT: development
      POSTGRES_DSN: postgresql+psycopg://legalise:legalise@db:5432/legalise
      REDIS_URL: redis://redis:6379/0
      S3_ENDPOINT: http://minio:9000
      GOTENBERG_URL: http://gotenberg:3000
      OLLAMA_URL: http://ollama:11434
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      PLUGINS_ROOT: /plugins
    ports:
      - "8000:8000"
    volumes:
      - ../backend:/app
      - matters_data:/data/matters
      # claude-for-uk-legal checkout — read-only bind mount. PLUGINS_ROOT
      # can be overridden via .env if the checkout lives elsewhere.
      - ${PLUGINS_HOST_PATH:-../../claude-for-uk-legal}:/plugins:ro
      # Manifest schema — read-only bind so `modules.py` validator and
      # the capability-vocabulary parity test can both find the canonical
      # schemas/module.json from the repo root.
      - ../schemas:/schemas:ro
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
      minio:
        condition: service_started

  worker:
    build: ../backend
    command: ["python", "-m", "app.worker"]
    environment:
      ENVIRONMENT: development
      POSTGRES_DSN: postgresql+psycopg://legalise:legalise@db:5432/legalise
      REDIS_URL: redis://redis:6379/0
      S3_ENDPOINT: http://minio:9000
      GOTENBERG_URL: http://gotenberg:3000
      OLLAMA_URL: http://ollama:11434
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      PLUGINS_ROOT: /plugins
    volumes:
      - ../backend:/app
      - matters_data:/data/matters
      - ${PLUGINS_HOST_PATH:-../../claude-for-uk-legal}:/plugins:ro
      - ../schemas:/schemas:ro
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  frontend:
    build: ../frontend
    ports:
      - "3000:3000"
    volumes:
      - ../frontend:/app
      - /app/node_modules
    depends_on:
      - backend

volumes:
  db_data:
  minio_data:
  ollama_data:
  matters_data:
